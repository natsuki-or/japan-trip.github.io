            --primary: #D32F2F; /* Japan Red */

            --text: #2D2D2D;    /* Charcoal */
            --gray: #8A8A8A;
            --accent: #2E5C5A;  /* Deep Green */
            --highlight: #E0BC5C; /* Gold/Wood */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- Lock Screen --- */
        #lockScreen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a1a;
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white;
            transition: opacity 0.5s ease;
        }
        .lock-content { text-align: center; width: 80%; max-width: 300px; }
        .lock-icon { font-size: 3rem; margin-bottom: 20px; animation: bounce 2s infinite; }
        .pass-input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #333; color: white; font-size: 1.1rem; text-align: center; margin-bottom: 15px;
            outline: none;
        }
        .pass-input:focus { border-color: var(--primary); }
        .unlock-btn {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer;
        }
        .error-msg { color: #ff6b6b; margin-top: 15px; font-size: 0.9rem; min-height: 1.2em; opacity: 0; transition: opacity 0.3s; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- Header --- */
        header {
            background-color: var(--card-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding-bottom: 10px;
        }
        
        .header-top {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }
        .header-top h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; }
        .header-top .subtitle { font-size: 0.7rem; color: var(--gray); text-transform: uppercase; margin-top: 5px; }
        
        /* Live Clock Badge */
        .live-badge {
            position: absolute; right: 15px; top: 15px;
            font-size: 0.7rem; background: #eee; padding: 4px 8px; border-radius: 4px; color: #555;
            display: flex; align-items: center; gap: 4px;
        }
        .live-dot { width: 6px; height: 6px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Day Navigation */
        .day-nav {
            display: flex;
            overflow-x: auto;
            padding: 15px 10px;
            gap: 12px;
            scrollbar-width: none;
        }
        .day-nav::-webkit-scrollbar { display: none; }

        .day-chip {
            flex: 0 0 auto;
            padding: 10px 18px;
            border-radius: 30px;
            background: #fff;
            border: 1px solid #ddd;
            color: var(--gray);
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .day-chip.active {
            background: var(--text);
            color: white;
            border-color: var(--text);
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .day-chip .date { font-size: 0.7rem; font-weight: normal; opacity: 0.8; display: block; }

        /* --- Timeline --- */
        .timeline-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .day-heading {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid var(--primary);
        }

        /* Event Card */
        .event-card {
            background: var(--card-bg);
            margin-bottom: 16px;
            border-radius: 16px;
            padding: 0;
            display: flex;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .event-card:active { transform: scale(0.98); }

        /* Locked State */
        .event-card.locked {
            background: #EAEAEA;
            pointer-events: none;
        }
        .event-card.locked .content-col { opacity: 0.5; }
        .event-card.locked .icon-col { filter: grayscale(100%); }

        /* Time Column */
        .time-col {
            width: 70px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #f0f0f0;
            padding: 10px;
            flex-shrink: 0;
        }
        .time-start { font-weight: 800; font-size: 0.95rem; color: var(--text); }
        .time-end { font-size: 0.75rem; color: var(--gray); margin-top: 4px; }

        /* Content Column */
        .content-col {
            flex: 1;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .event-icon { font-size: 1.8rem; width: 40px; text-align: center; }
        .text-group { flex: 1; }
        .event-title { font-weight: bold; font-size: 1rem; margin-bottom: 4px; line-height: 1.3; }
        .event-desc { font-size: 0.8rem; color: var(--gray); }
        
        .secret-badge {
            display: inline-block;
            background: var(--text);
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        /* Unlock Animation */
        @keyframes unlockPulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); background: #fff; }
            70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); background: #FFF5F5; }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); background: #fff; }
        }
        .unlocking { animation: unlockPulse 1s ease-out; }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex; align-items: flex-end; /* Bottom sheet style */
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-sheet {
            background: white;
            width: 100%; max-width: 600px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
            padding: 30px 20px 40px 20px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }

        .modal-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .modal-icon { font-size: 2.5rem; background: #f0f0f0; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .modal-title { font-size: 1.4rem; font-weight: bold; line-height: 1.2; }
        .modal-time { color: var(--primary); font-weight: bold; font-size: 0.9rem; margin-top: 5px; display: block;}
        
        .modal-body { font-size: 0.95rem; line-height: 1.6; color: #444; margin-bottom: 25px; }
        .modal-meta { background: #f9f9f9; padding: 15px; border-radius: 10px; font-size: 0.85rem; color: #666; margin-bottom: 20px;}
        .meta-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 5px;}

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 14px; border-radius: 12px; font-weight: bold; text-decoration: none;

        .btn-close { background: #eee; color: var(--text); cursor: pointer; }

        .slider-row { display: flex; width: 100%; gap: 10px; align-items: center; margin-top: 5px; }
        input[type="range"] { flex: 1; }
        .hide-debug { position: absolute; right: 10px; top: 5px; color: #aaa; cursor: pointer; }

</head>

                    { time: "17:00", end: "19:00", title: "Dinner: Okonomiyaki", secretTitle: "Hiroshima Style", icon: "🥞", 
                      desc: "Layers", loc: "Okonomimura", detail: "Noodles inside.", cost: "¥1,500" }
                ]
            },
            {
                id: "d12", dateStr: "2026/05/07", dayDisp: "5/07", dayName: "Thu", title: "Floating Shrine",
                events: [
                    { time: "09:00", end: "09:30", title: "Ferry", secretTitle: "Boat Ride", icon: "⛴", 
                      desc: "To Island", loc: "Miyajima", detail: "Scenic ride.", cost: "¥180" },
                    { time: "10:00", end: "12:00", title: "Itsukushima Shrine", secretTitle: "Floating Torii", icon: "⛩", 
                      desc: "Iconic View", loc: "Itsukushima Jinja", detail: "World Heritage.", cost: "¥300" },
                    { time: "12:30", end: "13:30", title: "Lunch: Oysters", secretTitle: "Sea Milk", icon: "🦪", 
                      desc: "Grilled", loc: "Miyajima", detail: "Fresh oysters.", cost: "¥2,000" },
                    { time: "15:00", end: "18:00", title: "Return to Osaka", secretTitle: "Final Transit", icon: "🚄", 
                      desc: "Shinkansen", loc: "Shin-Osaka", detail: "Back to start.", cost: "¥10,000" }
                ]
            },
            {
                id: "d13", dateStr: "2026/05/08", dayDisp: "5/08", dayName: "Fri", title: "Last Blast",
                events: [
                    { time: "10:00", end: "15:00", title: "USJ / Free", secretTitle: "Final Fun", icon: "🎢", 
                      desc: "Universal or Shopping", loc: "USJ", detail: "Theme park.", cost: "¥8,000" },
                    { time: "18:00", end: "21:00", title: "Farewell Dinner", secretTitle: "Last Supper", icon: "🍻", 
                      desc: "Party", loc: "Dotonbori", detail: "Eat everything.", cost: "¥5,000" }
                ]
            },
            {
                id: "d14", dateStr: "2026/05/09", dayDisp: "5/09", dayName: "Sat", title: "Departure",
                events: [
                    { time: "08:00", end: "10:00", title: "Train to KIX", icon: "🚆", loc: "Kansai Airport", detail: "Express.", cost: "¥1,500" },
                    { time: "11:00", end: "13:00", title: "Fly Home", secretTitle: "See you", icon: "🛫", 
                      desc: "KIX -> LHR", loc: "Kansai Airport", detail: "Safe flight.", cost: "-" }
                ]
            }
        ];

        // ==========================================
        // ⚙️ LOGIC
        // ==========================================

        let isAdmin = false;
        let selectedDayIndex = 0;
        let debugTimeMinutes = 360; // 6:00 AM for admin
        let timerInterval = null;

        // Unlock Function
        function unlockApp() {
            const input = document.getElementById('passInput').value;
            const err = document.getElementById('errorMsg');
            
            if (input === PASS_USER) {
                // USER MODE (Real Time)
                isAdmin = false;
                completeUnlock();
                startRealTimeClock();
            } else if (input === PASS_ADMIN) {
                // ADMIN MODE (Debug)
                isAdmin = true;
                completeUnlock();
                showAdminControls();
                initDebugMode();
            } else {
                // ERROR
                err.style.opacity = 1;
                setTimeout(() => err.style.opacity = 0, 2000);
            }
        }

        function completeUnlock() {
            const screen = document.getElementById('lockScreen');
            screen.style.opacity = 0;
            setTimeout(() => {
                screen.style.display = 'none';
                initApp();
            }, 500);
        }

        function showAdminControls() {
            document.getElementById('debugBar').style.display = 'flex';
        }

        function initApp() {
            // If User Mode, try to find today's date in schedule
            if (!isAdmin) {
                const today = new Date();
                // Format YYYY/MM/DD to match data
                const y = today.getFullYear();
                const m = String(today.getMonth() + 1).padStart(2, '0');
                const d = String(today.getDate()).padStart(2, '0');
                const todayStr = `${y}/${m}/${d}`;

                const foundIndex = scheduleData.findIndex(d => d.dateStr === todayStr);
                if (foundIndex !== -1) {
                    selectedDayIndex = foundIndex;
                } else {
                    // Default to Day 0 if out of range
                    selectedDayIndex = 0; 
                }
            }
            renderNav();
            renderTimeline();
        }

        // --- Clock Logic ---

        function startRealTimeClock() {
            document.getElementById('liveBadge').style.display = 'flex';
            updateRealTime(); // Run immediately
            timerInterval = setInterval(updateRealTime, 60000); // Update every minute
        }

        function updateRealTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            document.getElementById('currentTimeStr').textContent = `${h}:${m}`;
            
            // Check if day changed while app is open
            // (Simple implementation: just re-render timeline to update locks)
            renderTimeline();
        }

        function initDebugMode() {
            // Admin slider listener
            const slider = document.getElementById('timeSlider');
            slider.addEventListener('input', (e) => {
                debugTimeMinutes = parseInt(e.target.value);
                document.getElementById('debugTimeDisplay').textContent = formatTime(debugTimeMinutes);
                renderTimeline();
            });
        }

        // --- Rendering ---

        function renderNav() {
            const nav = document.getElementById('dayNav');
            nav.innerHTML = '';
            scheduleData.forEach((day, index) => {
                const chip = document.createElement('div');
                chip.className = `day-chip ${index === selectedDayIndex ? 'active' : ''}`;
                chip.innerHTML = `<span class="date">${day.dayDisp}</span>${day.dayName}`;
                chip.onclick = () => {
                    selectedDayIndex = index;
                    renderNav();
                    renderTimeline();
                };
                nav.appendChild(chip);
            });
        }

        function renderTimeline() {
            const container = document.getElementById('timeline');
            container.innerHTML = '';
            
            const day = scheduleData[selectedDayIndex];

            // Heading
            const heading = document.createElement('div');
            heading.className = 'day-heading';
            heading.textContent = day.title;
            container.appendChild(heading);

            // Determine "Current Time" for logic
            let currentMinutes;
            if (isAdmin) {
                currentMinutes = debugTimeMinutes;
            } else {
                const now = new Date();
                currentMinutes = now.getHours() * 60 + now.getMinutes();
                
                // If the selected day is in the future compared to real date, lock all
                // If selected day is past, unlock all
                // If selected day is TODAY, use current time
                const todayStr = getTodayStr();
                if (day.dateStr > todayStr) currentMinutes = -9999; // Future: Lock all
                else if (day.dateStr < todayStr) currentMinutes = 9999; // Past: Unlock all
                // else: it is today, use currentMinutes
            }

            day.events.forEach(evt => {
                const startMins = getMinutes(evt.time);
                // Unlock check
                // If admin, simple check. If user, ensure date matches or is past
                const isUnlocked = currentMinutes >= (startMins - UNLOCK_OFFSET);

                const card = document.createElement('div');
                card.className = `event-card ${isUnlocked ? '' : 'locked'}`;
                
                // Animation Logic
                if(isUnlocked && card.dataset.locked === 'true') {
                    card.classList.add('unlocking');
                }
                card.dataset.locked = !isUnlocked;

                const dTitle = isUnlocked ? evt.title : (evt.secretTitle || "Secret Activity");
                const dIcon = isUnlocked ? evt.icon : "🔒";
                const dDesc = isUnlocked ? evt.desc : "Wait for it...";
                const badge = (!isUnlocked) ? `<span class="secret-badge">SECRET</span><br>` : '';

                card.innerHTML = `
                    <div class="time-col">
                        <span class="time-start">${evt.time}</span>
                        <span class="time-end">${evt.end || ''}</span>
                    </div>
                    <div class="content-col">
                        <div class="event-icon">${dIcon}</div>
                        <div class="text-group">
                            ${badge}
                            <div class="event-title">${dTitle}</div>
                            <div class="event-desc">${dDesc}</div>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    if(!isUnlocked) {
                        alert(`🔒 Locked! Reveals at ${formatTime(startMins - UNLOCK_OFFSET)}`);
                    } else {
                        openModal(evt, day.dateStr);
                    }
                };
                container.appendChild(card);
            });
        }

        // --- Helpers ---

        function getMinutes(timeStr) {
            if(!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function formatTime(mins) {
            let h = Math.floor(mins / 60);
            let m = mins % 60;
            if(h < 0) h += 24;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function getTodayStr() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            return `${y}/${m}/${d}`;
        }

        // --- Modal ---
        const modal = document.getElementById('modal');
        function openModal(evt, dateStr) {
            document.getElementById('mIcon').textContent = evt.icon;
            document.getElementById('mTitle').textContent = evt.title;
            document.getElementById('mTime').textContent = `${dateStr} ${evt.time} - ${evt.end || '?'}`;
            document.getElementById('mDesc').textContent = evt.detail || evt.desc;
            document.getElementById('mLoc').textContent = evt.loc || 'Unknown';
            document.getElementById('mCost').textContent = evt.cost || '-';
            document.getElementById('mNote').textContent = "Tap 'Open Map' to see location.";
            const q = encodeURIComponent(evt.loc);
            document.getElementById('mMapBtn').href = `https://www.google.com/maps/search/?api=1&query=${q}`;
            modal.classList.add('active');
        }
        function closeModal() {
            modal.classList.remove('active');
        }
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });

    </script>
</body>
